version: "2"
linters:
  default: none
  enable:
    - asciicheck
    - copyloopvar
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - gosec
    - govet
    - ineffassign
    - makezero
    - nakedret
    - nosprintfhostport
    - prealloc
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    errorlint:
      errorf: true
    makezero:
      always: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters: [gosec]
        text: "G704" # SSRF via taint analysis - URLs are constructed from user-provided CLI flags
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - prefix(github.com/kevinrobayna)
        - prefix(github.com/kevinrobayna/aoc2md)
        - default
    gofumpt:
      module-path: github.com/kevinrobayna/aoc2md
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
